{% extends "layout.html" %}

{% block header %}Forensic Graph{% endblock %}

{% block scripts %}
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'default' });
</script>
{% endblock %}

{% block content %}
<div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 mb-8">
    <h3 class="text-gray-800 text-lg font-semibold mb-4">Entity Relationships</h3>
    
    <div class="border rounded-lg bg-gray-50 p-8 flex justify-center items-center min-h-[400px]">
        <pre class="mermaid">
            {{ mermaid_graph }}
        </pre>
    </div>
</div>
{% endblock %}
